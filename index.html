       #inicio {
            height: 100vh;

            align-items: center;

        .contenedor {
            max-width: 1200px;
            margin: auto;
        }
        /* Título épico */
        .titulo {
            font-size: 60px;
            margin-bottom: 40px;
            color: #facc15;
            text-shadow: 
                0 0 10px rgba(250, 204, 21, 0.8),
                0 0 20px rgba(250, 204, 21, 0.6),
                0 0 40px rgba(250, 204, 21, 0.4);
        }

        /* Navbar */
        .navbar {
            display: flex;
            gap: 20px;
        }

        /* Botones dorados */
        .navbar button {
            font-size: 20px;
            padding: 15px 30px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #facc15, #eab308);
            color: #1e293b;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.5);
            transition: all 0.2s ease;
        }

        .navbar button:hover {
            transform: scale(1.08);
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.8);
        }

        /* Tablas */
       table {
            width: 80%;
            margin: 30px auto;
            border-collapse: collapse;

            background: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(6px);

            border: 1px solid #333;
            border-radius: 15px;
            overflow: hidden;

            box-shadow: 0 0 20px rgba(0,0,0,0.9);
        }

        th {
            background-color: #1a1a1a;
            color: #facc15;
            font-size: 18px;
        }

        td, th {
            padding: 12px;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        tr:hover {
            background-color: #2a2a2a;
        }

        /* Ranking */
        .rankings {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            flex-wrap: wrap; /* para que en pantallas chicas se acomode */
        }

        /* mismo estilo que el ranking original */
       .ranking-box {
            width: 300px;

            background: rgba(17, 17, 17, 0.85); /* 🔥 transparencia */
            backdrop-filter: blur(6px); /* 🔥 glass effect */

            border: 1px solid rgba(250, 204, 21, 0.2);

            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;

            box-shadow: 
                0 0 20px rgba(0,0,0,0.9),
                0 0 10px rgba(250, 204, 21, 0.1);
        }

        /* título */
        .ranking-box h3 {
            color: #facc15;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.5);
        }

        /* lista */
        .ranking-box ul {
            list-style: none;
            padding: 0;
        }

        /* items */
       .ranking-box li {
            padding: 10px;
            margin-bottom: 8px;

            background: linear-gradient(90deg, #1a1a1a, #111);

            border-radius: 8px;

            display: flex;
            justify-content: space-between;

            transition: 0.2s;
        }

        .ranking-box li:first-child {
            border: 1px solid gold;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .ranking-box li:hover {
            background-color: #2a2a2a;
            transform: scale(1.02);
        }

    
        select {
            font-size: 18px;
            padding: 12px 20px;
            margin: 15px;
            border-radius: 10px;
            border: 1px solid #444;
            background-color: #111;
            color: #ccc;
            min-width: 200px;
            text-align: center;
            cursor: pointer;
        }

        select:valid {
            color: white;
        }

            font-size: 16px;

            margin: 10px;
            border-radius: 10px;
            border: none;

            background: linear-gradient(135deg, #facc15, #eab308);

            font-weight: bold;

// 6️⃣ Función para mostrar resultados filtrados y sumar puntos
function mostrarCofres(tipo = "todos") {

    const jugador = document.getElementById("jugador").value;
    const semana = document.getElementById("semana").value;
    const tabla = document.getElementById("tabla");
    const total = document.getElementById("total");

    tabla.innerHTML = "";
    total.innerHTML = "";

    if (!jugador) return;

    // 🔹 1. FILTRAR POR JUGADOR
    let filtrados = datos.filter(d => d.Jugador === jugador);

    // 🔹 2. FILTRAR POR SEMANA
    if (semana !== "Todas") {
        filtrados = filtrados.filter(d => d.semanaCalc === semana);
    }

    // 🔥 3. FILTRAR POR TIPO (ACA ESTABA TU ERROR)
    if (tipo === "diario") {
        filtrados = filtrados.filter(d => {
            let cofreRaw = d.Cofre.trim().toLowerCase();
            let cofreLimpio = cofreMap[cofreRaw] || cofreRaw;
            return tipoCofre[cofreLimpio] === "diario";
        });
    }

    if (tipo === "evento") {
        filtrados = filtrados.filter(d => {
            let cofreRaw = d.Cofre.trim().toLowerCase();
            let cofreLimpio = cofreMap[cofreRaw] || cofreRaw;
            return tipoCofre[cofreLimpio] === "evento";
        });
    }

    // 🔹 4. CONTAR Y SUMAR
    const conteo = {};
    let riquezaTotal = 0;

    filtrados.forEach(d => {
        let cofreRaw = d.Cofre.trim().toLowerCase();
        let cofreLimpio = cofreMap[cofreRaw] || cofreRaw;

        conteo[cofreLimpio] = (conteo[cofreLimpio] || 0) + 1;
        riquezaTotal += valoresCofre[cofreLimpio] || 0;
    });

    // 🔹 5. MOSTRAR EN TABLA
    Object.entries(conteo).forEach(([cofre, cant]) => {
        const puntos = (valoresCofre[cofre] || 0) * cant;

        const fila = document.createElement("tr");
        fila.innerHTML = `
            <td>${cofre}</td>
            <td>${cant}</td>
            <td>${puntos}</td>
        `;

        tabla.appendChild(fila);
    });

    total.innerHTML = `<strong>Riqueza total: ${riquezaTotal}</strong>`;
}
function mostrarRanking() {
    const lista = document.getElementById("ranking");
    lista.innerHTML = "";

    const semana = document.getElementById("semanaClan").value;

    const ranking = rankingClan(semana);

    ranking.forEach(([jugador, puntos], index) => {
        const li = document.createElement("li");
        li.innerHTML = `
            <span>#${index + 1} ${jugador}</span>
            <span>💰 ${puntos}</span>`;
        lista.appendChild(li);
            if (index === 0) li.style.border = "2px solid gold";
            if (index === 1) li.style.border = "2px solid silver";
            if (index === 2) li.style.border = "2px solid #cd7f32"; // bronce
        });
    console.log("ejecutando ranking diario");

}
function rankingClan(semana) {
    const ranking = {};

    datos.forEach(d => {
        if (semana !== "Todas" && d.semanaCalc !== semana) return;

        let cofreRaw = d.Cofre.trim().toLowerCase();
        let cofreLimpio = cofreMap[cofreRaw] || cofreRaw;

        let puntos = valoresCofre[cofreLimpio] || 0;

        ranking[d.Jugador] = (ranking[d.Jugador] || 0) + puntos;
    });

    return Object.entries(ranking)
        .sort((a, b) => b[1] - a[1]);
}
function mostrarRankingDiario() {

    const lista = document.getElementById("rankingDiario");
    lista.innerHTML = "";

    let semanaSeleccionada = document.getElementById("semanaClan").value;
    if (!semanaSeleccionada) return;

    let puntosPorJugador = {};

    datos.forEach(registro => {

        let tipo = (registro.Cofre || "").toLowerCase();
        let semana = registro.semanaCalc;

        // 👇 FILTRO POR SEMANA
        if (semanaSeleccionada !== "Todas" && semana !== semanaSeleccionada) {
            return;
        }

        if (
            tipo.includes("arena") ||
            tipo.includes("cripta") ||
            tipo.includes("ciudad")
        ) {

            let jugador = registro.Jugador || "Desconocido";

            if (!puntosPorJugador[jugador]) {
                puntosPorJugador[jugador] = 0;
            }

            puntosPorJugador[jugador] += 1;
        }
    });

    let ranking = Object.entries(puntosPorJugador)
        .sort((a, b) => b[1] - a[1]);

    ranking.forEach(([jugador, puntos]) => {
        let li = document.createElement("li");
        li.innerHTML = `<span>${jugador}</span> <span>${puntos}</span>`;
        lista.appendChild(li);
    });
}
function dibujarGrafico(ranking) {
    const labels = ranking.map(r => r[0]);
    const data = ranking.map(r => r[1]);

    new Chart(document.getElementById("graficoClan"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Puntos",
                data: data
            }]
        }
    });
}
function actividadDiaria() {
    const dias = {};

    datos.forEach(d => {
        const dia = d.Fecha.split(" ")[0];
        dias[dia] = (dias[dia] || 0) + 1;
    });

    return dias;
}
